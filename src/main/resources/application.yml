spring:
  application:
    name: ForgeIQ

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 5600000
  refresh-expiration: 604800000

gemini:
  api-key: ${GEMINI_API_KEY}